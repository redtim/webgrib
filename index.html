<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gribwebview — HRRR in the browser</title>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
      html, body, #map { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b0d10; }

      :root { --panel-width: 292px; }

      /* ---- panel ---- */
      #panel {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        background: rgba(11, 13, 16, 0.88); color: #e6edf3;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px; padding: 10px 12px; border-radius: 6px;
        border: 1px solid #30363d; min-width: 240px; max-width: 280px;
        max-height: calc(100vh - 24px); overflow-y: auto;
        transition: transform 0.2s ease, opacity 0.2s ease;
      }
      #panel.hidden {
        transform: translateX(calc(-100% - 24px));
        opacity: 0; pointer-events: none;
      }
      #panel-toggle {
        position: absolute; top: 14px; z-index: 11;
        left: var(--panel-width);
        background: rgba(22, 27, 34, 0.92); color: #8b949e;
        border: 1px solid #30363d; border-radius: 0 4px 4px 0;
        padding: 4px 6px; cursor: pointer;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px; transition: left 0.2s ease;
        line-height: 1;
      }
      #panel-toggle:hover { color: #e6edf3; }
      #panel-toggle.collapsed { left: 12px; border-radius: 4px; }
      #panel h1 { font-size: 13px; margin: 0 0 6px 0; }
      #panel select { width: 100%; box-sizing: border-box; }
      #status { margin-top: 8px; color: #7ee787; white-space: pre-wrap; font-size: 11px; }
      #status.err { color: #ff7b72; }

      /* ---- layer panel ---- */
      .layer-panel { margin-top: 8px; border-top: 1px solid #30363d; padding-top: 6px; }
      .layer-group { margin-bottom: 2px; }
      .layer-group-header {
        cursor: pointer; padding: 4px 6px; color: #8b949e;
        font-size: 11px; font-weight: bold; text-transform: uppercase;
        letter-spacing: 0.5px; user-select: none;
      }
      .layer-group-header:hover { color: #e6edf3; }
      .layer-group-header::before { content: '\25BE '; font-size: 10px; }
      .layer-group.collapsed .layer-group-list { display: none; }
      .layer-group.collapsed .layer-group-header::before { content: '\25B8 '; }
      .layer-group-list { padding-left: 4px; }
      .layer-item {
        display: flex; align-items: center; gap: 6px;
        padding: 3px 6px; cursor: pointer; border-radius: 3px;
      }
      .layer-item:hover { background: rgba(110, 118, 129, 0.15); }
      .layer-item.active { background: rgba(56, 139, 253, 0.2); color: #58a6ff; }
      .layer-kind {
        display: inline-flex; align-items: center; justify-content: center;
        width: 16px; height: 16px; border-radius: 3px;
        font-size: 9px; font-weight: bold; flex-shrink: 0;
      }
      .layer-kind-scalar { background: #1f3d2e; color: #7ee787; }
      .layer-kind-wind { background: #1f2d3d; color: #79c0ff; }
      .layer-label { font-size: 11px; }

      /* ---- timeline bar (bottom) ---- */
      #timeline-bar {
        position: absolute; bottom: 10vh; z-index: 10;
        /* Center in the space right of the panel */
        left: calc(var(--panel-width) + (100vw - var(--panel-width)) / 2);
        transform: translateX(-50%);
        transition: left 0.2s ease;
        background: rgba(22, 27, 34, 0.92);
        border: 1px solid #30363d; border-radius: 8px;
        padding: 8px 16px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px; color: #e6edf3;
        max-width: calc(100vw - var(--panel-width) - 40px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
      }
      #timeline-bar.panel-hidden {
        left: 50%;
        max-width: 90vw;
      }
      .timeline { display: flex; flex-direction: column; align-items: center; gap: 4px; overflow: hidden; }
      .timeline-scroll {
        overflow-x: auto; overflow-y: hidden; width: 100%;
        scrollbar-width: thin; scrollbar-color: #30363d transparent;
      }
      .timeline-inner { display: inline-flex; flex-direction: column; min-width: 100%; }
      .timeline-day-row { display: flex; align-items: flex-end; gap: 0; padding: 0 0 2px 0; flex-shrink: 0; }
      .timeline-day-label {
        color: #8b949e; font-size: 10px; font-weight: bold; text-transform: uppercase;
        text-align: center; border-left: 1px solid #484f58; padding: 0 4px;
        flex-shrink: 0;
      }
      .timeline-day-label:first-child { border-left: none; }
      .timeline-ticks { flex-shrink: 0; }
      .timeline-tick {
        flex-shrink: 0; min-width: 20px; padding: 2px 3px;
        background: #161b22; border: 1px solid #30363d; border-radius: 3px;
        color: #8b949e; font-size: 10px; cursor: pointer;
        font-family: inherit; text-align: center;
      }
      .timeline-tick:hover { background: #21262d; color: #e6edf3; }
      .timeline-tick.active { background: #1f6feb; color: #fff; border-color: #388bfd; }

      /* ---- level slider ---- */
      .level-slider { margin-top: 8px; border-top: 1px solid #30363d; padding-top: 6px; }
      .level-slider-title {
        color: #8b949e; font-size: 11px; font-weight: bold;
        text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
      }
      .level-slider-list { display: flex; flex-direction: column; gap: 1px; }
      .level-btn {
        padding: 3px 8px; background: #161b22; border: 1px solid #30363d;
        border-radius: 3px; color: #8b949e; font-size: 11px; cursor: pointer;
        font-family: inherit; text-align: left;
      }
      .level-btn:hover { background: #21262d; color: #e6edf3; }
      .level-btn.active { background: #1f6feb; color: #fff; border-color: #388bfd; }
      .layer-levels-badge {
        margin-left: auto; font-size: 9px; color: #8b949e;
        background: #21262d; padding: 1px 4px; border-radius: 3px;
      }

      /* ---- legend ---- */
      .legend { border-top: 1px solid #30363d; padding-top: 6px; }

      /* ---- popup ---- */
      .maplibregl-popup-content {
        background: rgba(11, 13, 16, 0.92); color: #e6edf3;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px; padding: 8px 10px;
        border: 1px solid #30363d; border-radius: 4px;
      }
      .maplibregl-popup-tip { display: none; }
      .inspect-title { color: #7ee787; font-weight: bold; margin-bottom: 4px; }
      .inspect-row { display: flex; justify-content: space-between; gap: 12px; }
      .inspect-row .k { color: #8b949e; }
    </style>
  </head>
  <body>
    <button id="panel-toggle">Layers</button>
    <div id="panel">
      <h1>gribwebview · HRRR</h1>
      <div id="status">idle</div>
    </div>
    <div id="timeline-bar"></div>
    <div id="map"></div>
    <script type="module" src="/src/demo/main.ts"></script>
  </body>
</html>
