<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gribwebview — HRRR in the browser</title>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
      html, body, #map { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b0d10; }
      #panel {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        background: rgba(11, 13, 16, 0.85); color: #e6edf3;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px; padding: 10px 12px; border-radius: 6px;
        border: 1px solid #30363d; min-width: 260px;
      }
      #panel h1 { font-size: 13px; margin: 0 0 6px 0; }
      #panel label { display: block; margin: 6px 0 2px; color: #8b949e; }
      #panel select, #panel button { width: 100%; box-sizing: border-box; }
      #status { margin-top: 8px; color: #7ee787; white-space: pre-wrap; }
      #status.err { color: #ff7b72; }
      .layers { margin-top: 8px; border-top: 1px solid #30363d; padding-top: 8px; }
      .layers .row { display: flex; align-items: center; gap: 6px; margin: 4px 0; color: #e6edf3; }
      .layers .row input[type=checkbox] { margin: 0; }
      .layers .row span { flex: 1; }
      .layers .row button { width: auto; padding: 2px 8px; font-size: 11px; }
      /* MapLibre popup overrides to match the dark panel */
      .maplibregl-popup-content {
        background: rgba(11, 13, 16, 0.92); color: #e6edf3;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px; padding: 8px 10px;
        border: 1px solid #30363d; border-radius: 4px;
      }
      .maplibregl-popup-tip { display: none; }
      .inspect-title { color: #7ee787; font-weight: bold; margin-bottom: 4px; }
      .inspect-row { display: flex; justify-content: space-between; gap: 12px; }
      .inspect-row .k { color: #8b949e; }
    </style>
  </head>
  <body>
    <div id="panel">
      <h1>gribwebview · HRRR</h1>
      <label for="field">Field</label>
      <select id="field"></select>
      <label for="cycle">Cycle</label>
      <select id="cycle"></select>
      <label for="fhour">Forecast hour</label>
      <select id="fhour"></select>
      <button id="load">Load</button>
      <div id="status">idle</div>
      <div class="layers">
        <div class="row">
          <input id="toggle-scalar" type="checkbox" checked />
          <span>Scalar overlay</span>
          <button id="remove-scalar">remove</button>
        </div>
        <div class="row">
          <input id="toggle-wind" type="checkbox" checked />
          <span>Wind particles</span>
          <button id="remove-wind">remove</button>
        </div>
      </div>
    </div>
    <div id="map"></div>
    <script type="module" src="/src/demo/main.ts"></script>
  </body>
</html>
